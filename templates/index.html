<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rice Disease Detection</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #74ebd5 0%, #ACB6E5 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0px 6px 20px rgba(0,0,0,0.2);
      text-align: center;
      width: 400px;
      transition: 0.3s;
    }
    .container:hover {
      transform: scale(1.02);
      box-shadow: 0px 8px 25px rgba(0,0,0,0.25);
    }
    h2 {
      color: #2e3d49;
      margin-bottom: 20px;
    }
    input[type="file"] {
      border: 2px dashed #4CAF50;
      padding: 12px;
      border-radius: 8px;
      width: 100%;
      margin-bottom: 15px;
      cursor: pointer;
      background: #f9f9f9;
    }
    input[type="submit"] {
      background: #4CAF50;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 8px;
      width: 100%;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }
    input[type="submit"]:hover {
      background: #45a049;
    }
    .result {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      font-size: 18px;
      font-weight: bold;
      color: white;
      background: #2196F3;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
    }
    .image-preview {
      margin-top: 15px;
      max-width: 100%;
      height: auto;
      border-radius: 10px;
      box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>🌾 Rice Disease Detection</h2>
    <form method="post" enctype="multipart/form-data">
      <input type="file" name="file" accept="image/*" required>
      <input type="submit" value="🔍 Predict Disease">
    </form>

    {% if prediction %}
      <div class="result">Prediction: {{ prediction }}</div>
      <img src="{{ url_for('static', filename='last_upload.jpg') }}" class="image-preview">
    {% endif %}
  </div>
</body>
</html>
